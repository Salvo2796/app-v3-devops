trigger: #Parte automaticamnete quando facciamo il push sul branch: main
  - main

pr: none #Non parte sulle Pull Request.

pool:
  name: Default #Usa l’agent pool chiamato Default.

variables: #Variabili che useremo dopo
  azureServiceConnection: "sc-obs-azure-rg" #Nome della Service Connection Azure DevOps che autentica verso Azure.
  resourceGroupName: "rg-observability-dev"
  acrName: "obsacr11696"
  imageName: "obsapp-v3"
  aciName: "obsapp-v3-aci"
  aciDnsName: "obsappv3-11696"
  location: "westeurope"
  containerPort: "8000"

stages: #Le stages sono le fasi
  - stage: BuildAndDeploy #Nome logico della fase.
    displayName: Build, Push and Deploy #Nome leggibile in UI.
    jobs:
      - job: BuildPushDeploy #Job principale
        displayName: Build image, push to ACR, deploy to ACI
        steps: #Lista dei comandi eseguiti.
          - checkout: self #Clona il repository corrente nell’agent.

          - task: AzureCLI@2 #Task ufficiale Azure DevOps che esegue Azure CLI autenticata.
            displayName: Build image, push to ACR and deploy to ACI
            inputs:
              azureSubscription: "$(azureServiceConnection)" #Usa la service connection per loggarsi automaticamente.
              scriptType: "bash" #Lo script è bash.
              scriptLocation: "inlineScript"
              inlineScript: |
                set -e
                set -x

                echo "Verifica subscription attiva"
                az account show

                echo "Login Docker su ACR"

                ACR_USER=$(az acr credential show -n $(acrName) --query username -o tsv)
                ACR_PASS=$(az acr credential show -n $(acrName) --query "passwords[0].value" -o tsv)

                echo $ACR_PASS | docker login $(acrName).azurecr.io \
                  -u $ACR_USER --password-stdin

                IMAGE_TAG=$(Build.BuildId)
                FULL_IMAGE_NAME="$(acrName).azurecr.io/$(imageName):${IMAGE_TAG}"

                echo "Build immagine"
                docker build -t $FULL_IMAGE_NAME .

                echo "Push immagine"
                docker push $FULL_IMAGE_NAME

                echo "IMAGE=${FULL_IMAGE_NAME}"
                echo "DNS=$(aciDnsName)"
                echo "RG=$(resourceGroupName)"

                echo "Elimino eventuale container precedente"
                az container delete --resource-group $(resourceGroupName) --name $(aciName) --yes || true

                echo "Recupero credenziali ACR"

                ACR_USER=$(az acr credential show -n $(acrName) --query username -o tsv | tr -d '\r\n')
                ACR_PASS=$(az acr credential show -n $(acrName) --query "passwords[0].value" -o tsv | tr -d '\r\n')

                echo "Creo nuovo container su ACI"
                az container create \
                  --resource-group $(resourceGroupName) \
                  --name $(aciName) \
                  --image $FULL_IMAGE_NAME \
                  --os-type Linux \
                  --cpu 1 \
                  --memory 1.5 \
                  --ports $(containerPort) \
                  --ip-address Public \
                  --dns-name-label $(aciDnsName) \
                  --location $(location) \
                  --registry-login-server $(acrName).azurecr.io \
                  --registry-username $ACR_USER \
                  --registry-password $ACR_PASS

                echo "Recupero FQDN"
                FQDN=$(az container show \
                  --resource-group $(resourceGroupName) \
                  --name $(aciName) \
                  --query ipAddress.fqdn -o tsv)

                echo "Applicazione disponibile su: http://$FQDN:$(containerPort)"